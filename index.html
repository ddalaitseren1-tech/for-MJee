<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message for You</title>
    <style>
        :root {
            --env-color: #f4d03f;
            --env-dark: #d4ac0d;
            --letter-color: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            margin: 0;
            cursor: pointer;
            font-family: sans-serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--env-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            perspective: 1000px; /* Needed for the 3D flip */
        }

        /* Envelope Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--env-color);
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 4;
        }

        /* Envelope Body */
        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid var(--env-color);
            z-index: 3;
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            width: 0; height: 0;
            border-left: 150px solid var(--env-color);
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            z-index: 3;
        }

        .right-side {
            position: absolute;
            top: 0; right: 0;
            width: 0; height: 0;
            border-right: 150px solid var(--env-color);
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            z-index: 3;
        }

        /* The Paper / Letter */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 10%;
            width: 80%;
            height: 80%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            transform-style: preserve-3d; /* Allows the flip */
        }

        /* Front and Back of the paper */
        .letter-front, .letter-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--letter-color);
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .letter-back {
            transform: rotateY(180deg);
            background: #fffafa;
        }

        .emoji { font-size: 50px; margin: 0; }
        .text { font-size: 16px; font-weight: bold; color: #333; margin-top: 5px; }

        /* Animation States */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .letter {
            transform: translateY(-140px);
        }

        /* The Flip State */
        .flipped .letter {
            transform: translateY(-140px) rotateY(180deg);
        }

        .instruction {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>

            </div>
        </div>

        <div id="instruction" class="instruction">Click to Open</div>
    </div>
