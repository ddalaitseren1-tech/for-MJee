<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter for You</title>
    <style>
        :root {
            --env-color: #f4d03f;
            --env-dark: #d4ac0d;
            --letter-color: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            margin: 0;
            cursor: pointer;
            font-family: sans-serif;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--env-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* The Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--env-color);
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 3;
        }

        /* The Envelope Body */
        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid var(--env-color);
            z-index: 2;
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid var(--env-color);
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            z-index: 2;
        }

        .right-side {
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-right: 150px solid var(--env-color);
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            z-index: 2;
        }

        /* The Letter / Finger */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 10%;
            width: 80%;
            height: 80%;
            background: var(--letter-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s ease;
            z-index: 1;
            font-size: 80px;
        }

        /* Animation States */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .open .letter {
            transform: translateY(-120px);
        }

        .instruction {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope">
        <div class="flap"></div>
        <div class="right-side"></div>
        <div class="letter">
            🖕
        </div>
        <div class="instruction">CLICK TO OPEN</div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        envelope.addEventListener('click', () => {
            envelope.classList.toggle('open');
        });
    </script>

</body>
</html>
